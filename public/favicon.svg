<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#080c14"/>
  <!-- Neural network nodes -->
  <!-- Input layer -->
  <circle cx="14" cy="20" r="5" fill="#00d4ff" opacity="0.9"/>
  <circle cx="14" cy="32" r="5" fill="#00d4ff" opacity="0.9"/>
  <circle cx="14" cy="44" r="5" fill="#00d4ff" opacity="0.9"/>
  <!-- Hidden layer -->
  <circle cx="32" cy="14" r="5" fill="#7c3aed" opacity="0.9"/>
  <circle cx="32" cy="26" r="5" fill="#7c3aed" opacity="0.9"/>
  <circle cx="32" cy="38" r="5" fill="#7c3aed" opacity="0.9"/>
  <circle cx="32" cy="50" r="5" fill="#7c3aed" opacity="0.9"/>
  <!-- Output layer -->
  <circle cx="50" cy="26" r="5" fill="#00ff88" opacity="0.9"/>
  <circle cx="50" cy="38" r="5" fill="#00ff88" opacity="0.9"/>
  <!-- Connections input→hidden -->
  <line x1="19" y1="20" x2="27" y2="14" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <line x1="19" y1="20" x2="27" y2="26" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <line x1="19" y1="20" x2="27" y2="38" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <line x1="19" y1="20" x2="27" y2="50" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <line x1="19" y1="32" x2="27" y2="14" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <line x1="19" y1="32" x2="27" y2="26" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="19" y1="32" x2="27" y2="38" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="19" y1="32" x2="27" y2="50" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <line x1="19" y1="44" x2="27" y2="26" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <line x1="19" y1="44" x2="27" y2="38" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <line x1="19" y1="44" x2="27" y2="50" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <!-- Connections hidden→output -->
  <line x1="37" y1="14" x2="45" y2="26" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
  <line x1="37" y1="26" x2="45" y2="26" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
  <line x1="37" y1="38" x2="45" y2="26" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
  <line x1="37" y1="50" x2="45" y2="38" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
  <line x1="37" y1="14" x2="45" y2="38" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  <line x1="37" y1="26" x2="45" y2="38" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
  <line x1="37" y1="38" x2="45" y2="38" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
  <line x1="37" y1="50" x2="45" y2="38" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
  <!-- Glow on active node -->
  <circle cx="32" cy="26" r="7" fill="#7c3aed" opacity="0.15"/>
  <circle cx="50" cy="26" r="7" fill="#00ff88" opacity="0.15"/>
</svg>

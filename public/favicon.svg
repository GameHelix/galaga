<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" fill="#000011"/>
  <!-- Neon glow filter -->
  <defs>
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Stars -->
  <circle cx="10" cy="8" r="1" fill="#ffffff" opacity="0.8"/>
  <circle cx="50" cy="15" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="30" cy="5" r="1" fill="#ffffff" opacity="0.9"/>
  <circle cx="55" cy="40" r="1" fill="#ffffff" opacity="0.7"/>
  <circle cx="5" cy="45" r="1" fill="#ffffff" opacity="0.5"/>
  <!-- Player ship body (cyan triangle) -->
  <polygon points="32,10 20,50 32,44 44,50" fill="#00d4ff" filter="url(#neon-glow)" opacity="0.9"/>
  <!-- Ship cockpit -->
  <polygon points="32,18 27,40 37,40" fill="#001133"/>
  <!-- Engine glow -->
  <ellipse cx="32" cy="50" rx="5" ry="3" fill="#00ff88" opacity="0.8" filter="url(#neon-glow)"/>
  <!-- Wing accents -->
  <line x1="20" y1="50" x2="26" y2="36" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="44" y1="50" x2="38" y2="36" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
</svg>
